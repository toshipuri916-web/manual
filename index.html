/* ======================================═
   IndexedDB
====================================═== */
const IDB_NAME = "task_manual_db", IDB_STORE = "images";
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
async function idbRun(mode, fn) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, mode);
    fn(tx.objectStore(IDB_STORE), res, rej);
    tx.onerror = e => rej(e.target.error);
  });
}
const idbSet    = (k,v) => idbRun("readwrite",(s,res)=>{ s.put(v,k); s.transaction.oncomplete=res; });
const idbDel    = k     => idbRun("readwrite",(s,res)=>{ s.delete(k); s.transaction.oncomplete=res; });
const idbGetAll = ()    => idbRun("readonly",(s,res)=>{
  const rk=s.getAllKeys(), rv=s.getAll(); let keys,vals;
  rk.onsuccess=e=>{keys=e.target.result; if(vals){const m={};keys.forEach((k,i)=>m[k]=vals[i]);res(m);}};
  rv.onsuccess=e=>{vals=e.target.result; if(keys){const m={};keys.forEach((k,i)=>m[k]=vals[i]);res(m);}};
});
const idbClear = () => idbRun("readwrite",(s,res)=>{ s.clear(); s.transaction.oncomplete=res; });

/* ======================================═
   画像圧縮
====================================═== */
const compressImage = (file, maxPx=1200, q=0.75) => new Promise(res => {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const s=Math.min(1,maxPx/Math.max(img.width,img.height));
      const w=Math.round(img.width*s), h=Math.round(img.height*s);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",q));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

          return {...i,translations:i.translations??{}};
        }));
        const rawTasks   = await Promise.all(p.tasks.map(async t=>({...t,translations:t.translations||{},items:await reEmbedItems(t.items)})));
        const rawManuals2 = p.manuals ? await Promise.all(p.manuals.map(async m=>({
          ...m, translations:m.translations||{},
          subcategories: await Promise.all((m.subcategories||m.items?.map(i=>({...i,items:[]})) ||[]).map(async s=>({
            ...s, translations:s.translations||{}, items:await reEmbedItems(s.items||[])
          })))
        }))) : [];
        const deduped = deduplicateIds(rawTasks, rawManuals2);
        const newTasks = deduped.tasks;
        const newManuals = deduped.manuals;
        setImgCache(cache); setTasks(newTasks); setManuals(newManuals);
        showToast("ok",`読み込み完了（${newTasks.length}件の作業）`);
      } catch(err){ showToast("err","読み込みエラー: "+err.message); }
    };
    reader.readAsText(file); e.target.value="";
  };

  /* -- MyMemory 翻訳 -- */
  const translateText = async (text,code) => {
    if(!text?.trim()) return text;
    const lp=`ja|${MM_CODES[code]||code}`;
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${lp}`);
    const d=await r.json();
    return d.responseData.translatedText||text;
  };
  const handleLangSwitch = async code => {
    if(code==="ja"){setLang("ja");return;}
    // すべての項目が翻訳済みかチェック
    const allTranslated = tasks.every(t=>t.translations?.[code]) && manuals.every(m=>m.translations?.[code]);
    if(allTranslated && tasks.length>0){setLang(code);return;}
    const li=ALL_LANGS.find(l=>l.code===code);
    setTransProgress(`${li.label}に翻訳中... 0%`);
    try {
      // 未翻訳の項目だけカウント・翻訳する
      const needsT  = o => !o.translations?.[code]?.title;
      const needsItem = i => !i.translations?.[code]?.label;
      let done=0, total=0;
      tasks.forEach(t=>{
        if(needsT(t)) total+=2+(t.date?1:0);
        t.items.forEach(i=>{ if(needsItem(i)) total+=2; });
      });
      manuals.forEach(m=>{
        if(needsT(m)) total+=2;
        (m.subcategories||[]).forEach(s=>{
          if(needsT(s)) total+=2;
          s.items.forEach(i=>{ if(needsItem(i)) total+=2; });
        });
      });
      if(total===0){ setLang(code); setTransProgress(null); return; }
      const tick=()=>setTransProgress(`${li.label}に翻訳中... ${Math.round(++done/total*100)}%`);
      const tItem=async i=>{
        if(!needsItem(i)) return i;
        return {...i,translations:{...i.translations,[code]:{label:await translateText(i.label,code).then(v=>{tick();return v;}),detail:await translateText(i.detail||"",code).then(v=>{tick();return v;})}}};
      };
      const tObj=async (o,extra={})=>{
        if(!needsT(o)) return {...o,...extra};
        const tr={title:await translateText(o.title,code).then(v=>{tick();return v;}),summary:await translateText(o.summary||"",code).then(v=>{tick();return v;})};
        if(o.date) tr.date=await translateText(o.date,code);
        return {...o,...extra,translations:{...o.translations,[code]:tr}};
      };
      const newTasks=await Promise.all(tasks.map(async t=>({...await tObj(t),items:await Promise.all(t.items.map(tItem))})));
      const newManuals=await Promise.all(manuals.map(async m=>({...await tObj(m),subcategories:await Promise.all((m.subcategories||[]).map(async s=>({...await tObj(s),items:await Promise.all(s.items.map(tItem))})))})));
      setTasks(newTasks); setManuals(newManuals); setLang(code);
      showToast("ok",`${li.label}に翻訳しました`);
    } catch(e){ showToast("err","翻訳エラー: "+e.message); }
    setTransProgress(null);
  };

  /* -- スケジュール CRUD -- */
  const addTask  = () => { if(!newTask.title.trim()) return; setTasks(p=>[...p,{...newTask,id:uid(),items:[],translations:{}}]); setShowAddTask(false); setNewTask({hour:9,minute:0,endHour:null,endMinute:0,days:[],title:"",summary:""}); };
  const saveTask = t => { setTasks(p=>p.map(x=>x.id===t.id?{...x,...t,translations:{}}:x)); setEditTask(null); };
  const deleteTask = id => openConfirm("この作業を削除しますか？",async()=>{ const t=tasks.find(x=>x.id===id); if(t) for(const i of t.items) if(isImgKey(i.image)) await deleteImage(i.image); setTasks(p=>p.filter(x=>x.id!==id)); setEditTask(null); if(expandedTask===id) setExpandedTask(null); });
  const reorderTasks = arr => setTasks(arr);

  /* -- カテゴリ CRUD -- */
  const addCat  = () => { if(!newCat.title.trim()) return; setManuals(p=>[...p,{...newCat,id:uid(),subcategories:[],translations:{}}]); setShowAddCat(false); setNewCat({title:"",summary:""}); };
  const saveCat = m => { setManuals(p=>p.map(x=>x.id===m.id?{...x,...m,translations:{}}:x)); setEditCat(null); };
  const deleteCat = id => openConfirm("このカテゴリを削除しますか？",async()=>{
    const m=manuals.find(x=>x.id===id);
    if(m) for(const s of m.subcategories||[]) for(const i of s.items||[]) if(isImgKey(i.image)) await deleteImage(i.image);
    setManuals(p=>p.filter(x=>x.id!==id));
    if(expandedCat===id) setExpandedCat(null);
    if(selSub?.catId===id) setSelSub(null);
    setEditCat(null);
  });
  const reorderCats = arr => setManuals(arr);

  /* -- サブカテゴリ CRUD -- */
  const addSub  = catId => { if(!newSub.title.trim()) return; const s={...newSub,id:uid(),items:[],translations:{}}; setManuals(p=>p.map(m=>m.id===catId?{...m,subcategories:[...(m.subcategories||[]),s]}:m)); setShowAddSub(null); setNewSub({title:"",summary:""}); };
  const saveSub = s => { setManuals(p=>p.map(m=>m.id===s.catId?{...m,subcategories:(m.subcategories||[]).map(x=>x.id===s.id?{...x,...s,translations:{}}:x)}:m)); setEditSub(null); };
  const deleteSub = (catId,subId) => openConfirm("このサブカテゴリを削除しますか？",async()=>{
    const m=manuals.find(x=>x.id===catId); const s=m?.subcategories?.find(x=>x.id===subId);
    if(s) for(const i of s.items||[]) if(isImgKey(i.image)) await deleteImage(i.image);
    setManuals(p=>p.map(m=>m.id===catId?{...m,subcategories:(m.subcategories||[]).filter(x=>x.id!==subId)}:m));
    if(selSub?.subId===subId) setSelSub(null);
    setEditSub(null);
  });
  const reorderSubs = (catId,arr) => setManuals(p=>p.map(m=>m.id===catId?{...m,subcategories:arr}:m));

  /* -- 手順 CRUD -- */
  const addItem = (catId,subId) => { setEditItem({id:uid(),label:"",detail:"",image:null,translations:{},catId,subId,isNew:true}); };
  const saveItem = item => {
    const {catId,subId,isNew,...clean}=item;
    const cleanNoTrans = isNew ? clean : {...clean,translations:{}};
    setManuals(p=>p.map(m=>m.id===catId?{...m,subcategories:(m.subcategories||[]).map(s=>s.id===subId?{...s,items:isNew?[...s.items,clean]:s.items.map(i=>i.id===clean.id?cleanNoTrans:i)}:s)}:m));
    setEditItem(null);
  };
  const deleteItem = item => openConfirm("この手順を削除しますか？",async()=>{
    if(isImgKey(item.image)) await deleteImage(item.image);
    setManuals(p=>p.map(m=>m.id===item.catId?{...m,subcategories:(m.subcategories||[]).map(s=>s.id===item.subId?{...s,items:s.items.filter(i=>i.id!==item.id)}:s)}:m));
    setEditItem(null); setSelItem(null);
  });
  const reorderItems = (catId,subId,arr) => setManuals(p=>p.map(m=>m.id===catId?{...m,subcategories:(m.subcategories||[]).map(s=>s.id===subId?{...s,items:arr}:s)}:m));

  // schedule step CRUD (for task detail sheet)
  const addTaskItem  = taskId => { setEditItem({id:uid(),label:"",detail:"",image:null,translations:{},taskId,isNew:true}); };
  const addLinkedItem = (taskId, catId, subId) => {
    const cat = manuals.find(m => m.id===catId);
    const sub = cat?.subcategories?.find(s => s.id===subId);
    if (!sub) return;
    const it = { id:uid(), label:getT(sub,"title","ja"), detail:"", image:null, translations:{}, linkRef:{catId, subId} };
    setTasks(p=>p.map(t=>t.id===taskId?{...t,items:[...(t.items||[]),it]}:t));
    setLinkPicker(null);
    showToast("ok", `「${sub.title}」をリンクしました`);
  };

  const saveTaskItem = item => {
    const {taskId,isNew,...clean}=item;
    const cleanNoTrans = isNew ? clean : {...clean,translations:{}};
    setTasks(p=>p.map(t=>t.id===taskId?{...t,items:isNew?[...(t.items||[]),clean]:t.items.map(i=>i.id===clean.id?cleanNoTrans:i)}:t));
    setEditItem(null);
  };
  const deleteTaskItem = item => openConfirm("この手順を削除しますか？",async()=>{
    if(isImgKey(item.image)) await deleteImage(item.image);
    setTasks(p=>p.map(t=>t.id===item.taskId?{...t,items:t.items.filter(i=>i.id!==item.id)}:t));
    setEditItem(null); setSelItem(null);
  });
  const reorderTaskItems = (taskId,arr) => { setTasks(p=>p.map(t=>t.id===taskId?{...t,items:arr}:t)); setSelTask(p=>p?.id===taskId?{...p,items:arr}:p); };

  const sorted = [...tasks].sort((a,b)=>a.hour*60+a.minute-(b.hour*60+b.minute));
  const currentSub = selSub ? (manuals.find(m=>m.id===selSub.catId)?.subcategories||[]).find(s=>s.id===selSub.subId) : null;

  return (
    <div style={{minHeight:"100vh",background:"#f0ede8",fontFamily:"'Noto Sans JP',sans-serif",color:"#1a1a20",touchAction:"manipulation"}}>
      <div style={{background:"#1a1a20",position:"sticky",top:0,zIndex:10,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <span style={{fontSize:15,fontWeight:700,color:"#f0eeea",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>作業マニュアル</span>
            <span style={{display:"flex",alignItems:"center"}}><span className="sdot"/><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"#4caf7d"}}>自動保存中</span></span>
            {editMode && <span className="ebadge">編集中</span>}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
            {enabledLangs.map(code=>{const l=ALL_LANGS.find(x=>x.code===code);if(!l)return null;return(<button key={code} className={`io${lang===code?" em":""}`} onClick={()=>handleLangSwitch(code)}><span style={{fontSize:15}}>{l.flag}</span><span style={{fontSize:11}}>{code==="ja"?"JP":code.toUpperCase()}</span></button>);})}
            <button className={`io${editMode?" em":""}`} onClick={editMode?exitEdit:enterEdit}>{editMode?"編集終了":"編集"}</button>
            <button className="io" onClick={()=>{if(passcode){setPassDigits([]);setPassError(false);setPassModal("settings");}else setShowSettings(true);}}>⚙️</button>
          </div>
        </div>
        <div style={{display:"flex",height:40,borderTop:"1px solid rgba(255,255,255,.08)"}}>
          <button className={`tab-btn${tab==="schedule"?" on":""}`} onClick={()=>setTab("schedule")}><span>タイムスケジュール</span><div className="tab-bar"/></button>
          <button className={`tab-btn${tab==="manual"?" on":""}`} onClick={()=>setTab("manual")}><span>マニュアル</span><div className="tab-bar"/></button>
        </div>
      </div>

      {toast && <div className="toast" style={{background:toast.type==="ok"?"#1a1a20":"#c05050",color:"#f5f3ef"}}>{toast.type==="ok"?"✓ ":"✕ "}{toast.text}</div>}
      {transProgress && <div style={{position:"fixed",inset:0,background:"rgba(10,9,7,.7)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{width:40,height:40,border:"3px solid rgba(255,255,255,.2)",borderTopColor:"#f0eeea",borderRadius:"50%",animation:"spin .8s linear infinite"}}/><div style={{color:"#f0eeea",fontSize:16,fontWeight:600}}>{transProgress}</div></div>}
      {tab==="schedule" && (
        <div>
          {/* 現在日時 */}
          <div style={{padding:"12px 16px",borderBottom:"1px solid #eae7e0",background:"#fff",position:"sticky",top:92,zIndex:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:22,fontWeight:700,color:"#1a1a20",letterSpacing:1,lineHeight:1}}>
                {now.getHours().toString().padStart(2,"0")}:{now.getMinutes().toString().padStart(2,"0")}
              </div>
              <div style={{fontSize:13,color:"#908e88",marginTop:3}}>
                {now.getFullYear()}年{now.getMonth()+1}月{now.getDate()}日（{"日月火水木金土"[now.getDay()]}）
              </div>
            </div>
            <button onClick={()=>openConfirm("全てのステータスを「未」にリセットしますか？",()=>setTaskStatus({}))}
              style={{background:"#f0ede8",border:"1px solid #dedad0",borderRadius:9,padding:"6px 11px",fontSize:11,fontWeight:600,color:"#909090",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
              リセット
            </button>
          </div>

          {sorted.length===0 && <div style={{textAlign:"center",padding:"60px 20px",color:"#b0ada8"}}><div style={{fontSize:36,marginBottom:12,opacity:.3}}>📋</div><div style={{fontSize:15}}>{editMode?"下の「＋ 作業追加」から追加してください。":"編集ボタンを押すと作業を追加できます。"}</div></div>}
          {sorted.map(task=>(
              <div key={task.id}>
                <div className={`cat-row${expandedTask===task.id?" expanded":""}${taskStatus[task.id]==="done"?" task-done":""}${taskStatus[task.id]==="doing"?" task-doing":""}`} onClick={()=>setExpandedTask(expandedTask===task.id?null:task.id)}>
                  {/* 時刻：左側中央寄せ */}
                  <div style={{minWidth:90,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRight:"1px solid #eae7e0",paddingRight:12,marginRight:12,gap:3}}>
                    <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:"#1a1a20",lineHeight:1}}>{fmt(task.hour,task.minute)}</span>
                    {task.endHour!=null&&task.endHour!==""&&<>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"#b0ada8",lineHeight:1}}>↓</span>
                      <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:"#908e88",lineHeight:1}}>{fmt(task.endHour,task.endMinute??0)}</span>
                    </>}
                    {task.priority==="low"&&<span className="pri-badge pri-low">持越可</span>}
                    {task.priority==="high"&&<span className="pri-badge pri-high">重要</span>}
                    {task.priority==="top"&&<span className="pri-badge pri-top">最重要</span>}
                  </div>
                  {/* 右側：曜日＋実施日・作業名・概要 */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center",marginBottom:6}}>
                      {DAYS.map(d=><span key={d} style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,padding:"3px 7px",borderRadius:5,fontWeight:500,background:task.days.includes(d)?"#1a1a20":"#eae7e0",color:task.days.includes(d)?"#f0eeea":"#b0ada8"}}>{d}</span>)}
                      {(getT(task,"date",lang)||task.date)&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,padding:"3px 7px",borderRadius:5,fontWeight:500,background:"#1a1a20",color:"#f0eeea"}}>{getT(task,"date",lang)||task.date}</span>}
                    </div>
                    <div style={{fontSize:16,fontWeight:700,color:"#1a1a20"}}>{getT(task,"title",lang)}</div>
                    {getT(task,"summary",lang)&&<div style={{fontSize:13,color:"#908e88",marginTop:3,lineHeight:1.4}}><LinkText text={getT(task,"summary",lang)}/></div>}
                  </div>
                  <div style={{fontSize:18,color:expandedTask===task.id?"#1a1a20":"#c8c4bc",fontWeight:700,transition:"transform .2s",transform:expandedTask===task.id?"rotate(90deg)":"none",flexShrink:0}}>›</div>
                  {editMode&&<button onClick={e=>{e.stopPropagation();setEditTask({...task});}} style={{background:expandedTask===task.id?"rgba(255,255,255,.15)":"#eae7e0",border:"none",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,color:"#1a1a20",cursor:"pointer",flexShrink:0}}>編集</button>}
                  {!editMode&&(
                    <div style={{paddingLeft:8,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                      {(()=>{
                        const s=taskStatus[task.id]||"none";

                        const cfg={none:{label:"未",bg:"#1a1a20",color:"#f0eeea"},doing:{label:"作業中",bg:"#f5c842",color:"#7a4000"},done:{label:"済",bg:"#4caf7d",color:"#fff"}};
                        const c=cfg[s];
                        return(
                          <button onClick={()=>setTaskStatus(p=>({...p,[task.id]:next}))}

                            {c.label}
                          </button>

                      })()}
                    </div>
                  )}
                </div>
                {expandedTask===task.id&&(
                  <div className="steps-panel" style={{padding:"16px"}}>
                    <StepList
                      items={task.items||[]}
                      lang={lang}
                      editMode={editMode}
                      resolveImg={resolveImg}
                      onAdd={()=>addTaskItem(task.id)}
                      onAddLink={()=>setLinkPicker(task.id)}
                      onTap={item=>item.linkRef?setLinkedItem({...item,taskId:task.id}):setSelItem({...item,taskId:task.id})}
                      onEdit={item=>item.linkRef?null:setEditItem({...item,taskId:task.id})}
                      onReorder={arr=>reorderTaskItems(task.id,arr)}
                      showToast={showToast}
                      manuals={manuals}
                      getT={getT}
                    />
                  </div>
                )}
              </div>
          ))}
          {editMode&&expandedTask===null&&(
            <div style={{padding:"12px 16px"}}>
              <button onClick={()=>setShowAddTask(true)} style={{background:"transparent",color:"#0d7377",border:"1.5px dashed #0d7377",borderRadius:10,padding:"12px 16px",fontSize:14,cursor:"pointer",fontFamily:"inherit",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span>📋</span> 作業追加</button>
            </div>

      )}
      {tab==="manual" && (
        <div>
          {manuals.length===0 && <div style={{textAlign:"center",padding:"60px 20px",color:"#b0ada8"}}><div style={{fontSize:36,marginBottom:12,opacity:.3}}>📖</div><div style={{fontSize:15}}>{editMode?"下の「＋ カテゴリ追加」から追加してください。":"編集ボタンを押すとカテゴリを追加できます。"}</div></div>}
          <DragList
            items={manuals}
            onReorder={reorderCats}
            editMode={editMode}
            showToast={showToast}
            renderItem={(cat,dragHandle)=>(
            <div key={cat.id}>
              <div className={`cat-row${expandedCat===cat.id?" expanded":""}`} onClick={()=>{ const next=expandedCat===cat.id?null:cat.id; setExpandedCat(next); setSelSub(null); }}>
                {editMode&&dragHandle}
                <div style={{fontSize:18,color:expandedCat===cat.id?"#1a1a20":"#c8c4bc",fontWeight:700,transition:"transform .2s",transform:expandedCat===cat.id?"rotate(90deg)":"none",flexShrink:0}}>›</div>
                <div style={{flex:1}}>
                  <div className="cat-title" style={{fontSize:16,fontWeight:700,color:"#1a1a20"}}>{getT(cat,"title",lang)}</div>
                  {getT(cat,"summary",lang)&&<div className="cat-summary" style={{fontSize:13,color:"#908e88",marginTop:3,lineHeight:1.4}}><LinkText text={getT(cat,"summary",lang)}/></div>}
                </div>
                {editMode&&<button onClick={e=>{e.stopPropagation();setEditCat({...cat});}} style={{background:"#eae7e0",border:"none",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,color:"#1a1a20",cursor:"pointer",flexShrink:0}}>編集</button>}
              </div>
              {expandedCat===cat.id && (
                <div className="sub-list">
                  <DragList
                    items={cat.subcategories||[]}
                    onReorder={arr=>reorderSubs(cat.id,arr)}
                    editMode={editMode}
                    showToast={showToast}
                    renderItem={(sub,dragHandle)=>(
                    <div key={sub.id}>
                      <div className={`sub-row${selSub?.catId===cat.id && selSub?.subId===sub.id?" sel":""}`} onClick={()=>setSelSub(selSub?.subId===sub.id?null:{catId:cat.id,subId:sub.id})}>
                        {editMode&&dragHandle}
                        <div style={{width:8,height:8,borderRadius:"50%",background:(selSub?.catId===cat.id && selSub?.subId===sub.id)?"#0d7377":"#c0bcb5",flexShrink:0,transition:"background .15s"}}/>
                        <div style={{flex:1}}>
                          <div className="sub-title" style={{fontSize:15,fontWeight:600,color:"#1a1a20"}}>{getT(sub,"title",lang)}</div>
                          {getT(sub,"summary",lang)&&<div className="sub-summary" style={{fontSize:12,color:"#908e88",marginTop:2}}><LinkText text={getT(sub,"summary",lang)}/></div>}
                        </div>
                        {editMode&&<button onClick={e=>{e.stopPropagation();setEditSub({...sub,catId:cat.id});}} style={{background:"#e0ddd6",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,color:"#1a1a20",cursor:"pointer",flexShrink:0}}>編集</button>}
                      </div>
                      {selSub?.catId===cat.id && selSub?.subId===sub.id && (
                        <div className="steps-panel" style={{padding:"16px 16px 16px 24px"}}>
                          <StepList
                            items={sub.items||[]}
                            lang={lang}
                            editMode={editMode}
                            resolveImg={resolveImg}
                            onAdd={()=>addItem(cat.id,sub.id)}
                            onTap={item=>setSelItem({...item,catId:cat.id,subId:sub.id})}

/* -- LinkText: URLを自動リンク化 -- */
function LinkText({ text, style }) {
  if (!text) return null;
  const URL_RE = /(https?:\/\/[^\s\u3000-\u9fff\uff00-\uffef、。！？「」【】]+)/g;
  const parts = text.split(URL_RE);
  return (
    <span style={style}>
      {parts.map((p, i) =>
        URL_RE.test(p)
          ? <a key={i} href={p} target="_blank" rel="noopener noreferrer"
              style={{color:"#0d7377",textDecoration:"underline",wordBreak:"break-all"}}
              onClick={e=>e.stopPropagation()}>{p}</a>
          : <span key={i}>{p}</span>
      )}
    </span>
  );
}


/* -- 起動時ID重複修正 -- */
function deduplicateIds(tasks, manuals) {
  const seen = new Set();
  const newId = () => { let id = String(Date.now() + Math.random()); while(seen.has(id)) id = String(Date.now() + Math.random()); seen.add(id); return id; };
  const fixItem = i => { const id = seen.has(i.id) ? newId() : (seen.add(i.id), i.id); return {...i, id}; };
  const fixSub  = s => { const id = seen.has(s.id) ? newId() : (seen.add(s.id), s.id); return {...s, id, items:(s.items||[]).map(fixItem)}; };
  const fixTask = t => { const id = seen.has(t.id) ? newId() : (seen.add(t.id), t.id); return {...t, id, items:(t.items||[]).map(fixItem)}; };
  const fixCat  = m => { const id = seen.has(m.id) ? newId() : (seen.add(m.id), m.id); return {...m, id, subcategories:(m.subcategories||[]).map(fixSub)}; };
  return { tasks: tasks.map(fixTask), manuals: manuals.map(fixCat) };
}

/* -- DragList（カテゴリ・サブカテゴリ・タスク共通の並び替えリスト） -- */
function DragList({ items, onReorder, editMode, showToast, renderItem }) {
  const [local,    setLocal]    = useState(items);
  const [dragIdx,  setDragIdx]  = useState(null);
  const [overIdx,  setOverIdx]  = useState(null);
  const [pending,  setPending]  = useState(null);
  const [showConf, setShowConf] = useState(false);
  const listRef = useRef(null);
  const dRef    = useRef(null);
  const active  = useRef(false);

  useEffect(() => {
    if (dRef.current === null && !showConf) setLocal(items);
  }, [items]);

  const getIdx = y => {
    const kids = Array.from(listRef.current?.children ?? []);
    for (let i = 0; i < kids.length; i++) if (y < kids[i].getBoundingClientRect().bottom) return i;
    return kids.length - 1;
  };
  const onDown = (e, i) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.setPointerCapture(e.pointerId); dRef.current=i; active.current=true; setDragIdx(i); setOverIdx(i); };
  const onMove = (e, i) => { if (!active.current||dRef.current!==i) return; e.preventDefault(); setOverIdx(getIdx(e.clientY)); };
  const onUp   = (e, i) => {
    if (!active.current||dRef.current!==i) return;
    active.current=false; const from=dRef.current, to=overIdx??from; dRef.current=null; setDragIdx(null); setOverIdx(null);
    if (from===to) return;
    const arr=[...local]; const [m]=arr.splice(from,1); arr.splice(to,0,m);
    setLocal(arr); setPending(arr); setShowConf(true);
  };

  const dragHandle = (i) => (
    <div
      style={{width:40,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#c8c4bc",fontSize:18,letterSpacing:-2,alignSelf:"stretch",touchAction:"none",cursor:"grab"}}
      onPointerDown={e=>onDown(e,i)} onPointerMove={e=>onMove(e,i)} onPointerUp={e=>onUp(e,i)} onPointerCancel={e=>onUp(e,i)}
    >⠿</div>
  );

  return (
    <>
      <div ref={listRef}>
        {local.map((item, i) => (
          <div key={item.id} style={{opacity:dragIdx===i?.4:1, outline:overIdx===i&&dragIdx!==null&&dragIdx!==i?"2px dashed #1a1a20":"none"}}>
            {renderItem(item, dragHandle(i))}
          </div>
        ))}
      </div>
      {showConf && (
        <div style={{position:"fixed",inset:0,background:"rgba(10,9,7,.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#faf8f4",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:400,boxShadow:"0 16px 60px rgba(0,0,0,.22)"}}>
            <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>順番を変更しますか？</div>
            <div style={{fontSize:14,color:"#808078",marginBottom:24,lineHeight:1.6}}>並び順が変更されます。確定しますか？</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowConf(false);setLocal(items);}} style={{flex:1,background:"#fff",border:"1.5px solid #dedad0",borderRadius:12,padding:"14px",fontSize:15,color:"#1a1a20",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>元に戻す</button>
              <button onClick={()=>{setShowConf(false);onReorder(pending);}} style={{flex:1,background:"#1a1a20",border:"none",borderRadius:12,padding:"14px",fontSize:15,color:"#f5f3ef",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>確定する</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* -- StepList -- */
function StepList({ items, lang, editMode, resolveImg, onAdd, onAddLink, onTap, onEdit, onReorder, showToast, manuals, getT }) {
  const [local,    setLocal]    = useState(items);
  const [dragIdx,  setDragIdx]  = useState(null);
  const [overIdx,  setOverIdx]  = useState(null);
  const [pending,  setPending]  = useState(null);
  const [showConf, setShowConf] = useState(false);
  const listRef = useRef(null);
  const dRef    = useRef(null);
  const active  = useRef(false);

  useEffect(() => {
    if (dRef.current === null && !showConf) setLocal(items);
  }, [items]);

  const getIdx = y => { const kids=Array.from(listRef.current?.children??[]); for(let i=0;i<kids.length;i++) if(y<kids[i].getBoundingClientRect().bottom) return i; return kids.length-1; };
  const onDown = (e,i) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.setPointerCapture(e.pointerId); dRef.current=i; active.current=true; setDragIdx(i); setOverIdx(i); };
  const onMove = (e,i) => { if(!active.current||dRef.current!==i) return; e.preventDefault(); setOverIdx(getIdx(e.clientY)); };
  const onUp   = (e,i) => {
    if(!active.current||dRef.current!==i) return;
    active.current=false; const from=dRef.current, to=overIdx??from; dRef.current=null; setDragIdx(null); setOverIdx(null);
    if(from===to) return;
    const arr=[...local]; const [m]=arr.splice(from,1); arr.splice(to,0,m);
    setLocal(arr); setPending(arr); setShowConf(true);
  };

  const getT2 = (obj,field) => { if(!lang||lang==="ja") return obj[field]||""; return obj.translations?.[lang]?.[field]||obj[field]||""; };

  return (
    <>
      {editMode&&local.length>1&&<div style={{fontSize:12,color:"#a0a09a",marginBottom:8}}>☰ をドラッグして並び替え</div>}
      <div ref={listRef} style={{display:"flex",flexDirection:"column",gap:8}}>
        {local.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"#b0ada8",fontSize:14}}>手順がありません</div>}
        {local.map((item,i)=>(
          <div key={item.id} className={`sc${dragIdx===i?" dra":""}${overIdx===i&&dragIdx!==null&&dragIdx!==i?" dov":""}`}>
            {editMode&&<div className="grip" onPointerDown={e=>onDown(e,i)} onPointerMove={e=>onMove(e,i)} onPointerUp={e=>onUp(e,i)} onPointerCancel={e=>onUp(e,i)}>⠿</div>}
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 14px 14px"+(editMode?" 0":" 14px"),flex:1,cursor:"pointer",minWidth:0}} onClick={()=>{if(!active.current&&dragIdx===null) onTap(item);}}>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,color:"#b0ada8",minWidth:26,flexShrink:0}}>{String(i+1).padStart(2,"0")}</span>
              {resolveImg(item.image)?<img src={resolveImg(item.image)} alt="" style={{width:48,height:48,borderRadius:10,objectFit:"cover",flexShrink:0,border:"1px solid #e0ddd6"}}/>:<div style={{width:48,height:48,borderRadius:10,background:"#eae7e0",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:20,opacity:.25}}>🖼</span></div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:15,fontWeight:600,color:item.label?"#1a1a20":"#b0ada8"}}>{getT2(item,"label")||"（手順名未設定）"}</div>
                {getT2(item,"detail")&&<div style={{fontSize:13,color:"#908e88",marginTop:3,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{getT2(item,"detail")}</div>}
              </div>
            </div>
            {editMode&&<button onClick={()=>onEdit(item)} style={{background:"#f5f2ec",border:"none",borderLeft:"1px solid #eae7e0",padding:"0 14px",fontSize:13,color:"#1a1a20",cursor:"pointer",fontFamily:"inherit",fontWeight:500,alignSelf:"stretch",flexShrink:0}}>編集</button>}
          </div>
        ))}
      </div>
      {editMode&&(
        <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
          <button onClick={onAdd} style={{background:"transparent",color:"#0d7377",border:"1.5px dashed #0d7377",borderRadius:10,padding:"12px 16px",fontSize:14,cursor:"pointer",fontFamily:"inherit",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span>📝</span> 手順追加</button>
          {onAddLink&&(
            <button onClick={onAddLink} style={{background:"transparent",color:"#0d7377",border:"1.5px dashed #0d7377",borderRadius:10,padding:"12px 16px",fontSize:14,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
              📎 マニュアルから選択
            </button>
          )}
        </div>
      )}
      {showConf&&(
        <div style={{position:"fixed",inset:0,background:"rgba(10,9,7,.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#faf8f4",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:400,boxShadow:"0 16px 60px rgba(0,0,0,.22)"}}>
            <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>順番を変更しますか？</div>
            <div style={{fontSize:14,color:"#808078",marginBottom:24,lineHeight:1.6}}>確定しますか？</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowConf(false);setLocal(items);}} style={{flex:1,background:"#fff",border:"1.5px solid #dedad0",borderRadius:12,padding:"14px",fontSize:15,color:"#1a1a20",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>元に戻す</button>
              <button onClick={()=>{setShowConf(false);onReorder(pending);}} style={{flex:1,background:"#1a1a20",border:"none",borderRadius:12,padding:"14px",fontSize:15,color:"#f5f3ef",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>確定する</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* -- TaskFields -- */
function TaskFields({ task, onChange }) {
  const allSel=DAYS.every(d=>task.days.includes(d));
  const togDay=d=>onChange(p=>({...p,days:p.days.includes(d)?p.days.filter(x=>x!==d):[...p.days,d]}));
  const togAll=()=>onChange(p=>({...p,days:allSel?[]:[...DAYS]}));
  const hasEnd=task.endHour!=null&&task.endHour!=="";
  return (
    <>
      <div style={{marginBottom:20}}><label className="lbl">開始時刻</label>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <select className="inp" style={{flex:1}} value={task.hour} onChange={e=>onChange(p=>({...p,hour:+e.target.value}))}>{Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")} 時</option>)}</select>
          <span className="tsep">:</span>
          <select className="inp" style={{flex:1}} value={task.minute} onChange={e=>onChange(p=>({...p,minute:+e.target.value}))}>{[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")} 分</option>)}</select>
        </div>
      </div>
      <div style={{marginBottom:20}}><label className="lbl">終了時刻（任意）</label>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0",borderTop:"1px solid #eae7e0",cursor:"pointer"}} onClick={()=>onChange(p=>({...p,endHour:hasEnd?null:(p.minute>=0?p.hour+1:p.hour),endMinute:hasEnd?0:p.minute}))}>
          <div style={{width:24,height:24,borderRadius:6,border:`1.5px solid ${hasEnd?"#1a1a20":"#dedad0"}`,background:hasEnd?"#1a1a20":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{hasEnd&&<span style={{color:"#f5f3ef",fontSize:14,fontWeight:700}}>✓</span>}</div>
          <span style={{fontSize:15,color:hasEnd?"#1a1a20":"#a0a09a",fontWeight:500}}>終了時刻を設定する</span>
        </div>
        {hasEnd&&<div style={{display:"flex",gap:10,alignItems:"center",marginTop:12}}>
          <select className="inp" style={{flex:1}} value={task.endHour??0} onChange={e=>onChange(p=>({...p,endHour:+e.target.value}))}>{Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,"0")} 時</option>)}</select>
          <span className="tsep">:</span>
          <select className="inp" style={{flex:1}} value={task.endMinute??0} onChange={e=>onChange(p=>({...p,endMinute:+e.target.value}))}>{[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{String(m).padStart(2,"0")} 分</option>)}</select>
        </div>}
      </div>
      <div style={{marginBottom:20}}><label className="lbl">実施曜日</label>
        <div style={{display:"flex",gap:6}}>
          <button className={`dtog all${allSel?" on":""}`} onClick={togAll}>All</button>
          <div style={{width:1,background:"#eae7e0",margin:"0 2px"}}/>
          {DAYS.map(d=><button key={d} className={`dtog${task.days.includes(d)?" on":""}`} onClick={()=>togDay(d)}>{d}</button>)}
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <label className="lbl">実施日（任意）</label>
        <input className="inp" value={task.date||""} onChange={e=>onChange(p=>({...p,date:e.target.value}))} placeholder="例：毎月1日、年末年始など"/>
      </div>
      <div style={{marginBottom:20}}>
        <label className="lbl">重要度（任意）</label>
        <div style={{display:"flex",gap:8}}>
          {[["","なし"],["low","持ち越し可"],["high","重要"],["top","最重要"]].map(([v,l])=>(
            <button key={v} type="button" onClick={()=>onChange(p=>({...p,priority:v}))}
              style={{flex:1,padding:"11px 0",borderRadius:10,border:`1.5px solid ${(task.priority||"")===""+v?"#1a1a20":"#dedad0"}`,background:(task.priority||"")===""+v?"#1a1a20":"#fff",color:(task.priority||"")===""+v?"#f0eeea":"#908e88",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:20}}><label className="lbl">作業名</label><input className="inp" value={task.title} onChange={e=>onChange(p=>({...p,title:e.target.value}))} placeholder="例：朝礼"/></div>
      <div style={{marginBottom:24}}><label className="lbl">概要（任意）</label><textarea className="inp" value={task.summary||""} onChange={e=>onChange(p=>({...p,summary:e.target.value}))} placeholder="作業の概要を入力..." style={{minHeight:80}}/></div>
    </>
  );
}

/* -- ItemEditSheet -- */
function ItemEditSheet({ item, resolveImg, onSave, onDelete, onClose, saveImage, deleteImage }) {
  const [label,    setLabel]    = useState(item.label  || "");
  const [detail,   setDetail]   = useState(item.detail || "");
  const [imgKey,   setImgKey]   = useState(item.image  || null);
  const [preview,  setPreview]  = useState(() => resolveImg(item.image));
  const [uploading,setUploading]= useState(false);
  const fileRef = useRef();

  useEffect(()=>{ if(imgKey) setPreview(resolveImg(imgKey)); },[imgKey]);

  const handleFile = async file => {
    if(!file||!file.type.startsWith("image/")) return;
    setUploading(true);
    const key=await saveImage(file,imgKey); setImgKey(key); setUploading(false);
  };
  const handleDelImg = async()=>{ await deleteImage(imgKey); setImgKey(null); setPreview(null); };
  const handleSave = () => onSave({...item, label, detail, image:imgKey, translations:item.translations||{}});

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="dh"/>
        <div className="sp">
          <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>手順を編集</div>
          <div style={{fontSize:12,color:"#a0a09a",marginBottom:20}}>※ 日本語で入力してください。</div>
          <div style={{marginBottom:20}}><label className="lbl">手順名</label><input className="inp" value={label} onChange={e=>setLabel(e.target.value)} placeholder="手順名を入力"/></div>
          <div style={{marginBottom:20}}><label className="lbl">詳細説明</label><textarea className="inp" value={detail} onChange={e=>setDetail(e.target.value)} placeholder="具体的な手順・注意点などを入力..."/></div>
          <div style={{marginBottom:28}}>
            <label className="lbl">画像</label>
            {uploading&&<div style={{padding:"20px",textAlign:"center",color:"#908e88",fontSize:14}}>圧縮・保存中...</div>}
            {!uploading&&preview&&<div style={{position:"relative",borderRadius:14,overflow:"hidden",height:220,background:"#eae7e0"}}><img src={preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(to top,rgba(0,0,0,.5),transparent)",display:"flex",gap:10,padding:16}}><button onClick={()=>fileRef.current.click()} style={{flex:1,background:"rgba(250,248,244,.95)",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,color:"#1a1a20",cursor:"pointer"}}>変更</button><button onClick={handleDelImg} style={{flex:1,background:"rgba(26,26,32,.75)",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,color:"#f0eeea",cursor:"pointer"}}>削除</button></div></div>}
            {!uploading&&!preview&&<div className="drop" onClick={()=>fileRef.current.click()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()}><span style={{fontSize:38,opacity:.25}}>🖼</span><span style={{fontSize:15,color:"#a0a09a"}}>タップして画像を追加</span><span style={{fontSize:12,color:"#c0bdb5"}}>JPG・PNG・GIF・WebP</span></div>}
            <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button className="btnP" onClick={handleSave}>保存する</button>
            {!item.isNew&&<button className="btnD" onClick={()=>onDelete(item)}>この手順を削除</button>}
            <button className="btnG" onClick={onClose}>キャンセル</button>
          </div>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
